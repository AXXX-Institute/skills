# Deploy the AXXX skills site to GitHub Pages. Multi-page, all static/committed —
# no rendering at deploy time.
#   /                     -> site/index.html            (landing: the two plugins)
#   /mlspace-jobs.html    -> site/mlspace-jobs.html     (mlspace-jobs plugin page)
#   /paper-to-poster/     -> plugins/paper-to-poster/skills/paper-to-poster/examples/ (poster gallery)
# Result: https://axxx-institute.github.io/skills/
name: Deploy site to Pages

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "plugins/paper-to-poster/skills/paper-to-poster/examples/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assemble site
        run: |
          mkdir -p _site
          cp -r site/* _site/
          mkdir -p _site/paper-to-poster
          cp -r plugins/paper-to-poster/skills/paper-to-poster/examples/* _site/paper-to-poster/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
